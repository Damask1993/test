<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="damasklogo.jpg" type="image/icon type">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <title>Damask Caffe Bar & Fast Food</title>
</head>

<body>
    <header>
        <div class="logo">
            <img id="logo" src="damasklogo.jpg" width="100px" height="100px">
            <nav id="toggleButton">
                <a href="#" id="mm">Menu</a>
                <a href="#toast">Toasts</a>
                <a href="#burgers">Burgers</a>
                <a href="#sandwiches">Sandwiches</a>
                <a href="#drinks">Drinks</a>
                <a href="#contact">Contact</a>

            </nav>
        </div>
        <div class="quote">Fresh, Fast and Delicious</div>
    </header>
    <main>
        <form id="survey">
            <fieldset id="toast" data-aos="fade-up" >
                <h1 class="title">Toasts</h1>
                <label class="item">
                    <div class="shija">
                        <h3 class="mishi">Sallam</h3>
                        <p class="desc">(sallam,kaçkavall,keçap dhe majonez)</p>
                    </div>
                    <p class="cmimi">50den</p>
                </label>
                <label class="item">
                    <div class="shija">
                        <h3 class="mishi">Suxhuk</h3>
                        <p class="desc">(suxhuk,kaçkavall,keçap dhe majonez)</p>
                    </div>
                    <p class="cmimi">60den</p>
                </label>
                <label class="item">
                    <div class="shija">
                        <h3 class="mishi">Proshut</h3>
                        <p class="desc">(proshut,kaçkavall,keçap dhe majonez)</p>
                    </div>
                    <p class="cmimi">60den</p>
                </label>
                <label class="item">
                    <div class="shija">
                        <h3 class="mishi">HotDog</h3>
                        <p class="desc">(virshëll,kaçkavall,keçap dhe majonez)</p>
                    </div>
                    <p class="cmimi">60den</p>
                </label>
                <label class="foot">
                    <h2 id="foot">Çdo porosi me pomfrit</h2>
                    <p id="foot-price">+30den</p>
                </label>
            </fieldset>
        </form>
    </main>


    <script>
                document.getElementById("toggleButton").onclick = function () {
            this.classList.toggle("clicked");
        };
        // Function to check the screen width and remove the "Menu" link if the screen is larger than 768px
function checkScreenWidth() {
  const screenWidth = window.innerWidth;
  const menuLink = document.getElementById('mm');

  if (screenWidth > 769) {
    // Remove the "Menu" link if the screen width is larger than 768px
    if (menuLink) {
      menuLink.remove();
    }
  }
}

// Run the function when the page loads
window.addEventListener('load', checkScreenWidth);

// Run the function on window resize to handle dynamic changes
window.addEventListener('resize', checkScreenWidth);

    </script>
     <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
     <script>
         AOS.init();
     </script>
</body>

</html>
